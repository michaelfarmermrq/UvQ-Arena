      <stop offset="0%" stop-color="var(--uvq-u-cyan-hi, #b3e8ff)"></stop>
      <stop offset="45%" stop-color="var(--uvq-brand-cyan-500, #00b3ff)"></stop>
      <stop offset="100%" stop-color="var(--uvq-brand-blue-500, #0a2ecb)"></stop>
    </linearGradient>
    <linearGradient id="up-trail" x1="0" y1="0.5" x2="1" y2="0.5">

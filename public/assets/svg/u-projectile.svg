<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80">
  <title>U projectile</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e8ff"></stop>
      <stop offset="45%" stop-color="#00b3ff"></stop>
      <stop offset="100%" stop-color="#0a2ecb"></stop>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#00b3ff" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#00b3ff" stop-opacity="0.9"></stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feFlood flood-color="#00b3ff" flood-opacity="0.6"></feFlood>
      <feComposite in2="b" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <path d="M 0 40 Q 30 34, 60 40 Q 30 46, 0 40 Z" fill="url(#trail)"></path>
  <ellipse cx="30" cy="40" rx="22" ry="4" fill="#00b3ff" opacity="0.35"></ellipse>
  <g filter="url(#glow)" transform="translate(60 8)">
    <path d="M 4 4 L 4 36 C 4 52, 16 60, 32 60 C 48 60, 60 52, 60 36 L 60 4 L 46 4 L 46 36 C 46 44, 40 48, 32 48 C 24 48, 18 44, 18 36 L 18 4 Z" fill="url(#body)" stroke="#0c2287" stroke-width="2" stroke-linejoin="round"></path>
    <path d="M 7 6 L 7 35 C 7 42, 10 47, 14 48 L 14 6 Z" fill="#fff" opacity="0.45"></path>
  </g>
</svg>